<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍄 Yeni Blog Yaz - Nurt'un Mario Dünyası</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, addDoc, Timestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
          apiKey: "AIzaSyDwfa99kZW0fFbZOy7VMK-9nGojW-clfK8",
          authDomain: "nurt-blog.firebaseapp.com",
          projectId: "nurt-blog",
          storageBucket: "nurt-blog.firebasestorage.app",
          messagingSenderId: "253816623177",
          appId: "1:253816623177:web:3240f87397c2cc8b496f98",
          measurementId: "G-15YMV04V6J"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.firebaseDB = db;
        window.firebaseCollection = collection;
        window.firebaseAddDoc = addDoc;
        window.firebaseTimestamp = Timestamp;
    </script>
    <style>
        :root {
            --mario-red: #E52521;
            --mario-blue: #049CD8;
            --mario-yellow: #FBD000;
            --mario-green: #43B047;
            --mario-brown: #8B4513;
            --mario-dark: #1A1A2E;
            --mario-sky: #5C94FC;
            --mario-ground: #C84B0C;
            --mario-brick: #C84B0C;
            --mario-white: #F8F8F8;
            --mario-orange: #F28C0F;
            --coin-gold: #FFD700;
            --shadow-pixel: 4px 4px 0px #000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { image-rendering: pixelated; }

        body {
            font-family: 'Press Start 2P', monospace;
            background-color: var(--mario-sky);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Underground/Castle bg for create page */
        .bg-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(180deg, #1A2A6C 0%, #1A4A8C 40%, #2A5A9C 100%);
            z-index: 0;
        }

        /* Star field */
        .stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 60%;
            z-index: 1;
            pointer-events: none;
            background-image:
                radial-gradient(1px 1px at 10% 15%, white, transparent),
                radial-gradient(1px 1px at 25% 8%, white, transparent),
                radial-gradient(2px 2px at 40% 20%, white, transparent),
                radial-gradient(1px 1px at 55% 5%, white, transparent),
                radial-gradient(2px 2px at 70% 18%, white, transparent),
                radial-gradient(1px 1px at 85% 10%, white, transparent),
                radial-gradient(1px 1px at 15% 35%, white, transparent),
                radial-gradient(2px 2px at 60% 30%, white, transparent),
                radial-gradient(1px 1px at 90% 25%, white, transparent),
                radial-gradient(1px 1px at 5% 45%, white, transparent);
        }

        /* Brick wall pattern at bottom */
        .brick-floor {
            position: fixed;
            bottom: 0; left: 0;
            width: 100%; height: 56px;
            background: 
                repeating-linear-gradient(
                    90deg,
                    #C84B0C 0px, #C84B0C 62px,
                    #8B3500 62px, #8B3500 66px
                ),
                repeating-linear-gradient(
                    0deg,
                    transparent 0px, transparent 26px,
                    #8B3500 26px, #8B3500 30px
                );
            background-blend-mode: multiply;
            z-index: 2;
            border-top: 6px solid #8B3500;
        }

        /* Floating star coins decoration */
        .star-coins {
            position: fixed;
            bottom: 56px;
            width: 100%;
            z-index: 2;
            pointer-events: none;
            height: 50px;
        }
        .star-coin {
            position: absolute;
            width: 24px; height: 24px;
            background: var(--coin-gold);
            border: 3px solid #000;
            border-radius: 50%;
            animation: starCoinFloat 2s ease-in-out infinite;
        }
        .star-coin::after {
            content: '★';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px;
            color: #8B6914;
        }
        .star-coin:nth-child(1) { left: 8%; animation-delay: 0s; }
        .star-coin:nth-child(2) { left: 20%; animation-delay: 0.3s; }
        .star-coin:nth-child(3) { left: 35%; animation-delay: 0.6s; }
        .star-coin:nth-child(4) { left: 50%; animation-delay: 0.9s; }
        .star-coin:nth-child(5) { left: 65%; animation-delay: 1.2s; }
        .star-coin:nth-child(6) { left: 80%; animation-delay: 1.5s; }
        .star-coin:nth-child(7) { left: 92%; animation-delay: 1.8s; }
        @keyframes starCoinFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(180deg); }
        }

        #root {
            position: relative;
            z-index: 10;
            padding: 20px 20px 90px;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
        }

        /* HEADER */
        .header {
            text-align: center;
            margin-bottom: 35px;
            animation: headerPop 0.5s cubic-bezier(0.36,0,0.66,-0.56) forwards;
            animation-delay: 0.1s;
            opacity: 0;
        }
        @keyframes headerPop {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.08); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .header h1 {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(0.9rem, 3vw, 1.6rem);
            color: var(--mario-yellow);
            text-shadow: 4px 4px 0 #000, 8px 8px 0 rgba(0,0,0,0.4);
            line-height: 1.6;
            letter-spacing: 2px;
        }
        .header-sub {
            font-family: 'VT323', monospace;
            font-size: 1.8rem;
            color: white;
            text-shadow: 2px 2px 0 #000;
            margin-top: 8px;
            letter-spacing: 4px;
        }
        .mario-deco {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: block;
            animation: decoSpin 4s linear infinite;
        }
        @keyframes decoSpin {
            0%, 40%, 100% { transform: scale(1); }
            20% { transform: scale(1.2) rotate(10deg); }
        }

        /* HUD */
        .hud-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.8);
            border: 4px solid var(--coin-gold);
            padding: 10px 18px;
            margin-bottom: 25px;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.5rem;
            color: white;
            flex-wrap: wrap;
            gap: 8px;
            box-shadow: 0 0 0 2px #000, 4px 4px 0 #000;
        }
        .hud-item { display: flex; flex-direction: column; gap: 4px; }
        .hud-label { color: var(--mario-yellow); }
        .hud-value { color: white; }

        /* NAV */
        .nav {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .nav-btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.55rem;
            padding: 12px 18px;
            border: 4px solid #000;
            cursor: pointer;
            color: white;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.1s, box-shadow 0.1s;
            position: relative;
            line-height: 1.6;
        }
        .nav-btn-red { background: var(--mario-red); box-shadow: 0 6px 0 #8B1410, 4px 4px 0 #000; }
        .nav-btn-green { background: var(--mario-green); box-shadow: 0 6px 0 #2D7A30, 4px 4px 0 #000; }
        .nav-btn-blue { background: var(--mario-blue); box-shadow: 0 6px 0 #025A85, 4px 4px 0 #000; }
        .nav-btn-yellow { background: var(--mario-yellow); color: #000; box-shadow: 0 6px 0 #8B6914, 4px 4px 0 #000; }
        .nav-btn:hover { transform: translateY(-3px); }
        .nav-btn:active { transform: translateY(3px); }
        .nav-btn.active { outline: 3px solid white; }

        /* FORM CARD */
        .form-card {
            background: rgba(0,0,0,0.85);
            border: 4px solid var(--coin-gold);
            box-shadow: 0 0 0 2px #000, 8px 8px 0 #000;
            overflow: hidden;
            animation: cardSlide 0.4s ease-out both;
            animation-delay: 0.2s;
        }
        @keyframes cardSlide {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .form-header {
            background: linear-gradient(90deg, var(--mario-red) 0%, #C01010 100%);
            padding: 18px 25px;
            border-bottom: 4px solid var(--coin-gold);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .form-header-icon {
            font-size: 2rem;
            animation: iconBob 1s ease-in-out infinite alternate;
        }
        @keyframes iconBob {
            0% { transform: translateY(0); }
            100% { transform: translateY(-6px); }
        }
        .form-header-text {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.65rem;
            color: white;
            text-shadow: 2px 2px 0 #000;
            line-height: 1.6;
        }

        .form-body { padding: 30px 25px; }

        .form-group {
            margin-bottom: 28px;
        }
        .form-group label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.6rem;
            color: var(--mario-yellow);
            margin-bottom: 12px;
            text-shadow: 2px 2px 0 #000;
        }
        .label-block {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px; height: 28px;
            background: var(--mario-yellow);
            color: #000;
            border: 3px solid #000;
            font-size: 0.8rem;
            flex-shrink: 0;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 18px;
            background: #1A1A2E;
            border: 3px solid var(--coin-gold);
            color: var(--mario-white);
            font-family: 'VT323', monospace;
            font-size: 1.35rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
            border-radius: 0;
        }
        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: rgba(255,255,255,0.3);
            font-family: 'VT323', monospace;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--mario-green);
            box-shadow: 0 0 0 2px var(--mario-green), 0 0 12px rgba(67, 176, 71, 0.3);
        }
        .form-group textarea {
            min-height: 220px;
            resize: vertical;
        }

        /* Character counter */
        .char-counter {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.45rem;
            color: rgba(255,255,255,0.4);
            text-align: right;
            margin-top: 6px;
        }
        .char-counter.good { color: var(--mario-green); }
        .char-counter.warning { color: var(--mario-yellow); }

        /* SUBMIT */
        .btn-submit {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.7rem;
            width: 100%;
            padding: 20px;
            background: var(--mario-green);
            color: white;
            border: 4px solid #000;
            box-shadow: 0 8px 0 #2D7A30, 4px 4px 0 #000;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-shadow: 2px 2px 0 #000;
            position: relative;
            top: 0;
        }
        .btn-submit:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 0 #2D7A30, 4px 4px 0 #000;
            background: #55CC5A;
        }
        .btn-submit:active {
            top: 6px;
            box-shadow: 0 2px 0 #2D7A30, 4px 4px 0 #000;
        }
        .btn-submit:disabled {
            background: #444;
            box-shadow: 0 4px 0 #222, 4px 4px 0 #000;
            cursor: not-allowed;
            transform: none;
            top: 0;
        }

        /* LEVEL CLEAR animation */
        .success-screen {
            background: rgba(0,0,0,0.9);
            border: 4px solid var(--coin-gold);
            box-shadow: 0 0 0 2px #000, inset 0 0 30px rgba(251,208,0,0.1);
            padding: 30px;
            margin-bottom: 25px;
            text-align: center;
            animation: successPop 0.5s cubic-bezier(0.36,0,0.66,-0.56);
        }
        @keyframes successPop {
            0% { transform: scale(0.5) rotate(-5deg); }
            80% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .level-clear-text {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(0.8rem, 2.5vw, 1.2rem);
            color: var(--mario-yellow);
            text-shadow: 3px 3px 0 #000, 0 0 20px rgba(251,208,0,0.5);
            margin-bottom: 15px;
            animation: levelClearBlink 0.5s steps(2) 3;
        }
        @keyframes levelClearBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .score-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .score-item {
            font-family: 'VT323', monospace;
            font-size: 1.4rem;
            color: white;
        }
        .score-val {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.8rem;
            color: var(--mario-green);
            display: block;
        }
        .success-link {
            display: inline-block;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.55rem;
            color: white;
            background: var(--mario-blue);
            border: 3px solid #000;
            box-shadow: 4px 4px 0 #000;
            padding: 12px 20px;
            text-decoration: none;
            margin-top: 15px;
            transition: transform 0.1s;
        }
        .success-link:hover { transform: translateY(-2px); }

        /* Stars row animation */
        .star-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 10px 0;
            font-size: 1.8rem;
        }
        .star-row span {
            animation: starPop 0.4s ease-out both;
        }
        .star-row span:nth-child(1) { animation-delay: 0.2s; }
        .star-row span:nth-child(2) { animation-delay: 0.5s; }
        .star-row span:nth-child(3) { animation-delay: 0.8s; }
        @keyframes starPop {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            80% { transform: scale(1.3) rotate(10deg); }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }

        /* Divider */
        .pixel-divider {
            height: 4px;
            background: repeating-linear-gradient(
                90deg,
                var(--coin-gold) 0px, var(--coin-gold) 8px,
                transparent 8px, transparent 16px
            );
            margin: 25px 0;
        }

        @media (max-width: 640px) {
            .form-body { padding: 20px 15px; }
            .form-header { padding: 14px 15px; }
            .hud-bar { font-size: 0.4rem; padding: 8px 12px; }
        }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="stars"></div>
    <div class="brick-floor"></div>
    <div class="star-coins">
        <div class="star-coin"></div>
        <div class="star-coin"></div>
        <div class="star-coin"></div>
        <div class="star-coin"></div>
        <div class="star-coin"></div>
        <div class="star-coin"></div>
        <div class="star-coin"></div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function CreateBlogPage() {
            const [formData, setFormData] = useState({ title: '', content: '' });
            const [success, setSuccess] = useState(false);
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!formData.title.trim() || !formData.content.trim()) {
                    alert('HATA! Tüm alanları doldurun! 🍄');
                    return;
                }
                setLoading(true);
                try {
                    await window.firebaseAddDoc(
                        window.firebaseCollection(window.firebaseDB, 'blogs'),
                        {
                            title: formData.title,
                            content: formData.content,
                            createdAt: window.firebaseTimestamp.now()
                        }
                    );
                    setFormData({ title: '', content: '' });
                    setSuccess(true);
                    setTimeout(() => setSuccess(false), 6000);
                } catch (error) {
                    console.error(error);
                    alert('Blog eklenirken hata oluştu! Firebase ayarlarını kontrol et!');
                }
                setLoading(false);
            };

            const titleLen = formData.title.length;
            const contentLen = formData.content.length;

            return (
                <div className="container">
                    {/* Header */}
                    <div className="header">
                        <span className="mario-deco">⭐ 🍄 🎮 🍄 ⭐</span>
                        <h1>YENİ BLOG YARAT!</h1>
                        <div className="header-sub">LEVEL EDITOR MODE</div>
                    </div>

                    {/* HUD */}
                    <div className="hud-bar">
                        <div className="hud-item">
                            <div className="hud-label">YAZAR</div>
                            <div className="hud-value">NURT</div>
                        </div>
                        <div className="hud-item">
                            <div className="hud-label">MOD</div>
                            <div className="hud-value">YARATICI</div>
                        </div>
                        <div className="hud-item">
                            <div className="hud-label">BAŞLIK</div>
                            <div className="hud-value">{titleLen} HARF</div>
                        </div>
                        <div className="hud-item">
                            <div className="hud-label">İÇERİK</div>
                            <div className="hud-value">{contentLen} HARF</div>
                        </div>
                    </div>

                    {/* Nav */}
                    <div className="nav">
                        <a href="index.html" className="nav-btn nav-btn-red">
                            📖 BLOGLAR
                        </a>
                        <a href="create-blog.html" className="nav-btn nav-btn-yellow active">
                            ✍️ YENİ BLOG
                        </a>
                    </div>

                    {/* Success Screen */}
                    {success && (
                        <div className="success-screen">
                            <div className="level-clear-text">✨ LEVEL CLEAR! ✨</div>
                            <div className="star-row">
                                <span>⭐</span><span>⭐</span><span>⭐</span>
                            </div>
                            <div className="score-row">
                                <div className="score-item">
                                    BLOG EKLENDİ
                                    <span className="score-val">+1000 PUAN</span>
                                </div>
                                <div className="score-item">
                                    KOMBİNASYON
                                    <span className="score-val">MÜKEMMEL!</span>
                                </div>
                            </div>
                            <div className="pixel-divider"></div>
                            <a href="index.html" className="success-link">
                                ▶ TÜM BLOGLARI GÖR
                            </a>
                        </div>
                    )}

                    {/* Form Card */}
                    <div className="form-card">
                        <div className="form-header">
                            <div className="form-header-icon">📝</div>
                            <div className="form-header-text">
                                YENİ MACERA YARAT<br/>
                                <span style={{color:'rgba(255,255,255,0.6)', fontSize:'0.5rem'}}>TÜM ALANLARI DOLDUR</span>
                            </div>
                        </div>

                        <div className="form-body">
                            <form onSubmit={handleSubmit}>
                                <div className="form-group">
                                    <label>
                                        <span className="label-block">?</span>
                                        BLOG BAŞLIĞI
                                    </label>
                                    <input
                                        type="text"
                                        placeholder="Başlığını buraya yaz..."
                                        value={formData.title}
                                        onChange={(e) => setFormData({...formData, title: e.target.value})}
                                    />
                                    <div className={`char-counter ${titleLen > 10 ? 'good' : titleLen > 0 ? 'warning' : ''}`}>
                                        {titleLen} / ∞ HARF
                                    </div>
                                </div>

                                <div className="form-group">
                                    <label>
                                        <span className="label-block">★</span>
                                        BLOG İÇERİĞİ
                                    </label>
                                    <textarea
                                        placeholder="Neler yaşadın? Ne düşündün? Yaz bakalım..."
                                        value={formData.content}
                                        onChange={(e) => setFormData({...formData, content: e.target.value})}
                                    />
                                    <div className={`char-counter ${contentLen > 50 ? 'good' : contentLen > 0 ? 'warning' : ''}`}>
                                        {contentLen} / ∞ HARF
                                    </div>
                                </div>

                                <div className="pixel-divider"></div>

                                <button
                                    type="submit"
                                    className="btn-submit"
                                    disabled={loading}
                                >
                                    {loading ? (
                                        <>
                                            <span style={{animation:'spin 0.5s steps(8) infinite', display:'inline-block'}}>🍄</span>
                                            KAYDEDİLİYOR...
                                        </>
                                    ) : (
                                        <>
                                            🎮 BLOGU KAYDET & YAYINLA
                                        </>
                                    )}
                                </button>
                            </form>
                        </div>
                    </div>

                    {/* Footer deco */}
                    <div style={{textAlign:'center', marginTop:'25px', opacity:0.4}}>
                        <span style={{fontFamily:"'Press Start 2P'", fontSize:'0.45rem', color:'white', letterSpacing:'4px'}}>
                            🍄 SUPER NURT BLOG 🍄
                        </span>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<CreateBlogPage />, document.getElementById('root'));
    </script>

    <style>
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</body>
</html>
